<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5.000 - MULTIJUGADOR ONLINE</title>
    <!-- Cargamos Socket.io desde el CDN -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --gold: #ffd700; --neon-green: #39ff14; --danger: #ff4444; --metal: #a8a8a8; }
        html, body { overflow: hidden; height: 100dvh; width: 100%; margin: 0; background: #050505; color: white; font-family: 'Arial Black', sans-serif; touch-action: none; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; gap: 10px; }

        /* ================= LOBBY ================= */
        #lobby {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background: #050505; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .lobby-box {
            background: #111; padding: 30px; border: 3px solid var(--gold); border-radius: 30px;
            text-align: center; width: min(92vw, 420px);
        }
        .lobby-box h1 { color: var(--gold); margin-bottom: 20px; }
        .input-lobby {
            width: 80%; padding: 12px; margin: 10px 0; background: #222; border: 2px solid #555;
            color: white; border-radius: 10px; font-size: 16px; text-align: center; font-family: 'Arial Black', sans-serif;
        }
        .input-lobby:focus { border-color: var(--gold); outline: none; }
        .btn-lobby {
            width: 80%; margin: 10px 0; padding: 12px; font-size: 16px; font-weight: bold;
            border-radius: 12px; border: 2px solid var(--gold); background: transparent; color: white; cursor: pointer;
        }
        .btn-lobby:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-lobby:disabled { opacity: 0.5; cursor: not-allowed; }
        #codigo-sala-display {
            font-size: 24px; color: var(--neon-green); margin: 15px 0; letter-spacing: 2px;
            background: #000; padding: 10px; border-radius: 10px; border: 1px dashed var(--neon-green);
        }
        .lista-jugadores-lobby { margin: 15px 0; text-align: left; padding: 0 20px; }
        .lista-jugadores-lobby li { margin-bottom: 5px; color: #ccc; }

        /* ================= JUEGO (Estilos originales adaptados) ================= */
        #pantalla-juego { display: none; width: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        
        .panel-superior { width: min(94vw, 580px); text-align: center; z-index: 10; position: relative; }
        .grid-jugadores { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-bottom: 5px; }
        .jugador-box { background: rgba(255,255,255,0.03); padding: 10px 5px; border-radius: 12px; border: 1px solid #333; transition: all 0.3s ease; }
        .jugador-box.activo { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.08); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); transform: scale(1.05); }
        .label-jugador { font-size: 10px; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .jugador-box.activo .label-jugador { color: var(--neon-green); }
        .pts-t { font-size: 20px; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .marcador-turno { display: inline-block; background: rgba(0,0,0,0.8); padding: 2px 30px; border-radius: 50px; border: 2px solid var(--gold); margin: 5px 0; }
        .val-turno { font-size: 32px; color: var(--gold); }
        #anuncio { font-size: 14px; color: #aaa; height: 20px; }

        .fieltro { width: min(94vw, 550px); height: min(48dvh, 380px); background: radial-gradient(circle, #2ecc71 0%, #144418 100%); border-radius: 40px; border: 12px solid #3d2b1f; display: flex; flex-direction: column; padding: 0; box-sizing: border-box; box-shadow: inset 0 0 80px rgba(0,0,0,0.8); position: relative; overflow: hidden; z-index: 5; }
        .zona-reserva { height: 75px; border-bottom: 2px dashed rgba(255,255,255,0.15); display: flex; justify-content: center; align-items: center; gap: 8px; z-index: 10; position: relative; }
        .zona-tiro { flex-grow: 1; position: relative; width: 100%; overflow: visible; }

        #cubilete { position: absolute; width: 110px; height: 140px; bottom: -160px; right: -30px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border-radius: 40px 40px 8px 8px; border: 1px solid #222; border-top: 3px solid var(--metal); box-shadow: 0 15px 30px rgba(0,0,0,0.9); z-index: 100; }
        .anim-lanzar { animation: lanzarFisico 1.6s ease-in-out forwards; }
        @keyframes lanzarFisico { 0% { bottom: -160px; right: -30px; transform: rotate(15deg); } 20% { bottom: 40px; right: 40px; transform: rotate(-10deg); } 50% { transform: translate(-120px, -40px) rotate(-10deg); } 65% { transform: translate(-150px, -50px) rotate(160deg); } 100% { bottom: -220px; right: -80px; transform: rotate(40deg); } }

        .dado { position: absolute; width: 60px; height: 60px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 5px 12px rgba(0,0,0,0.6); opacity:0; transition: opacity 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .visible { opacity:1; }
        .puntuando { border: 4px solid var(--neon-green); box-shadow: 0 0 20px var(--neon-green); z-index: 50; }
        .reservado { position: static !important; transform: scale(0.7) rotate(0deg) !important; opacity: 0.9; margin: 0 2px; }

        .controles { display: flex; gap: 15px; width: min(94vw, 550px); justify-content: center; margin-top: 5px; z-index: 10; position: relative; }
        button { flex: 1; padding: 16px 0; font-size: 16px; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .btn-tirar { background: var(--gold); color: #000; box-shadow: 0 5px 0 #b8860b; }
        .btn-plantar { background: #eee; color: #000; box-shadow: 0 5px 0 #999; }
        button:disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        /* ================= MODAL GANADOR ================= */
        #modal-ganador {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background: rgba(0,0,0,0.92); z-index: 15000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-ganador-contenido {
            background: #111; border: 3px solid var(--gold); border-radius: 20px;
            padding: 30px; text-align: center; max-width: 90%; width: 400px;
            box-shadow: 0 0 40px rgba(255,215,0,0.4);
        }
        .modal-ganador-contenido h2 { color: var(--gold); font-size: 24px; margin-bottom: 15px; }
        .nombre-ganador { color: #fff; font-size: 28px; font-weight: bold; margin: 20px 0; }
        .btn-jugar-otra {
            background: var(--gold); color: #000; border: none; padding: 12px 25px;
            font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- ================= LOBBY ================= -->
    <div id="lobby">
        <div class="lobby-box">
            <h1>🎲 5.000 ONLINE</h1>
            <input type="text" id="input-nombre" class="input-lobby" placeholder="Tu nombre" maxlength="10">
            
            <div id="seccion-crear">
                <button class="btn-lobby" onclick="crearSala()">🏠 CREAR SALA</button>
            </div>

            <div id="seccion-unirse" style="display:none;">
                <p style="color:#aaa; font-size:12px;">Código de sala:</p>
                <input type="text" id="input-codigo" class="input-lobby" placeholder="Ej: ABC123" style="text-transform:uppercase;">
                <button class="btn-lobby" onclick="unirseSala()"> UNIRSE A SALA</button>
            </div>

            <div id="seccion-sala" style="display:none;">
                <p style="color:#aaa; font-size:12px;">Código de tu sala (compártelo):</p>
                <div id="codigo-sala-display"></div>
                <ul id="lista-jugadores" class="lista-jugadores-lobby"></ul>
                <button id="btn-iniciar" class="btn-lobby" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="iniciarPartida()" disabled>▶️ INICIAR PARTIDA (Mín. 2)</button>
                <button class="btn-lobby" style="border-color: var(--danger); color: var(--danger); font-size: 12px;" onclick="location.reload()"> CANCELAR</button>
            </div>
            
            <div id="mensaje-error" style="color: var(--danger); margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>

    <!-- ================= PANTALLA DE JUEGO ================= -->
    <div id="pantalla-juego">
        <div class="panel-superior">
            <div id="grid-jugadores" class="grid-jugadores"></div>
            <div class="marcador-turno"><span id="pts-turno" class="val-turno">0</span></div>
            <div id="anuncio">Esperando...</div>
        </div>

        <div class="fieltro">
            <div id="reserva" class="zona-reserva"></div>
            <div id="zona-tiro" class="zona-tiro"><div id="cubilete"></div></div>
        </div>

        <div class="controles">
            <button id="btn-plantar" class="btn-plantar" onclick="enviarPlantarse()" disabled>PLANTARSE</button>
            <button id="btn-tirar" class="btn-tirar" onclick="enviarTirada()" disabled>¡TIRAR!</button>
        </div>
    </div>

    <!-- ================= MODAL GANADOR ================= -->
    <div id="modal-ganador">
        <div class="modal-ganador-contenido">
            <h2> ¡GANADOR!</h2>
            <div id="nombre-ganador" class="nombre-ganador"></div>
            <button class="btn-jugar-otra" onclick="location.reload()">🔄 VOLVER AL LOBBY</button>
        </div>
    </div>

<script>
    // ================= CONEXIÓN AL SERVIDOR =================
    // Al estar en el mismo dominio, socket.io se conecta solo a la URL actual
    const socket = io(); 
    
    let miId = socket.id;
    let codigoSala = '';
    let miNombre = '';
    let esMiTurno = false;
    let jugadores = []; // {id, nombre, puntos}
    
    // Estado del turno actual
    let puntosTurno = 0;
    let dadosActivos = 5;
    let bloqueo = false;

    const CARAS = [
        { id: 0, html: '<div style="display:grid; grid-template-columns: repeat(3,1fr); gap:3px; width:75%;"><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div><div></div><div style="width:7px;height:7px;background:#222;border-radius:50%;"></div></div>' },
        { id: 1, html: '<div style="display:grid; grid-template-columns: repeat(3,1fr); gap:3px; width:75%;"><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div><div></div><div style="width:7px;height:7px;background:red;border-radius:50%;"></div></div>' },
        { id: 2, html: '<b style="font-size:32px; color:#222">J</b>' },
        { id: 3, html: '<b style="font-size:32px; color:#222">Q</b>' },
        { id: 4, html: '<b style="font-size:32px; color:red">K</b>' },
        { id: 5, html: '<div style="width:24px; height:24px; background:red; border-radius:50%;"></div>' }
    ];

    // ================= FUNCIONES DEL LOBBY =================
    function crearSala() {
        miNombre = document.getElementById('input-nombre').value.trim();
        if (!miNombre) return mostrarError("Pon un nombre");
        socket.emit('crear-sala', miNombre);
    }

    function unirseSala() {
        miNombre = document.getElementById('input-nombre').value.trim();
        codigoSala = document.getElementById('input-codigo').value.trim().toUpperCase();
        if (!miNombre) return mostrarError("Pon un nombre");
        if (!codigoSala) return mostrarError("Pon un código");
        socket.emit('unirse-sala', { codigo: codigoSala, nombre: miNombre });
    }

    function iniciarPartida() {
        socket.emit('iniciar-partida', codigoSala);
    }

    function mostrarError(msg) {
        document.getElementById('mensaje-error').innerText = msg;
        setTimeout(() => document.getElementById('mensaje-error').innerText = '', 3000);
    }

    // ================= EVENTOS DEL SERVIDOR =================
    socket.on('sala-creada', (data) => {
        codigoSala = data.codigo;
        miId = socket.id; // Guardamos nuestro ID
        document.getElementById('seccion-crear').style.display = 'none';
        document.getElementById('seccion-sala').style.display = 'block';
        document.getElementById('codigo-sala-display').innerText = codigoSala;
        actualizarListaLobby([data]);
    });

    socket.on('jugador-unido', (data) => {
        // data.jugadores es la lista actualizada
        if (document.getElementById('seccion-sala').style.display !== 'none') {
            actualizarListaLobby(data.jugadores);
            document.getElementById('btn-iniciar').disabled = data.jugadores.length < 2;
        }
    });

    socket.on('error-sala', (msg) => {
        mostrarError(msg);
    });

    socket.on('partida-iniciada', (data) => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'flex';
        jugadores = data.jugadores;
        renderizarMarcador();
        actualizarTurnoUI(data.turno);
    });

    socket.on('resultado-tirada', (data) => {
        bloqueo = false;
        if (data.puntos === 0) {
            document.getElementById('anuncio').innerHTML = "<b style='color:red'>¡NADA! PIERDES TURNO</b>";
            document.getElementById('btn-tirar').disabled = true;
            document.getElementById('btn-plantar').disabled = true;
            // Avisamos al servidor que perdemos el turno para que pase al siguiente
            setTimeout(() => socket.emit('perder-turno', codigoSala), 1500);
            return;
        }

        puntosTurno += data.puntos;
        document.getElementById('pts-turno').innerText = puntosTurno;
        document.getElementById('anuncio').innerText = `+${data.puntos} puntos. ¿Tirar o Plantar?`;
        
        // Animar dados (simplificado para online)
        animarDadosServidor(data.dados);

        // Habilitar botones si es mi turno
        if (esMiTurno) {
            document.getElementById('btn-tirar').disabled = false;
            // Validar si puede plantarse (lógica visual, el servidor valida al final)
            const jugadorActual = jugadores.find(j => j.id === miId);
            let min = (jugadorActual && jugadorActual.puntos >= 4000) ? 100 : 300;
            let puedePlantar = (puntosTurno >= min) && (puntosTurno % 100 === 0) && (jugadorActual.puntos + puntosTurno <= 5000);
            document.getElementById('btn-plantar').disabled = !puedePlantar;
        }
    });

    socket.on('victoria-instantanea', (data) => {
        mostrarGanador(data.ganador);
    });

    socket.on('partida-terminada', (data) => {
        mostrarGanador(data.ganador);
    });

    socket.on('cambiar-turno', (data) => {
        jugadores = data.jugadores;
        renderizarMarcador();
        actualizarTurnoUI(data.turno);
        limpiarMesa();
        puntosTurno = 0;
        document.getElementById('pts-turno').innerText = "0";
        document.getElementById('anuncio').innerText = `Turno de ${data.jugador}`;
    });

    socket.on('turno-perdido', (data) => {
        document.getElementById('anuncio').innerHTML = `<b style='color:red'>${data.jugador} no sacó nada.</b>`;
    });

    // ================= LÓGICA DE JUEGO (CLIENTE) =================
    function enviarTirada() {
        if (!esMiTurno || bloqueo) return;
        bloqueo = true;
        document.getElementById('btn-tirar').disabled = true;
        document.getElementById('btn-plantar').disabled = true;
        document.getElementById('anuncio').innerText = "Tirando...";
        limpiarZonaActiva();
        
        const cubilete = document.getElementById('cubilete');
        cubilete.classList.remove('anim-lanzar'); void cubilete.offsetWidth; cubilete.classList.add('anim-lanzar');
        
        socket.emit('tirar-dados', codigoSala);
    }

    function enviarPlantarse() {
        if (!esMiTurno || bloqueo) return;
        bloqueo = true;
        document.getElementById('btn-tirar').disabled = true;
        document.getElementById('btn-plantar').disabled = true;
        socket.emit('plantarse', codigoSala);
    }

    function actualizarTurnoUI(turnoIdx) {
        const jugadorTurno = jugadores[turnoIdx];
        esMiTurno = (jugadorTurno.id === miId);
        
        document.querySelectorAll('.jugador-box').forEach((box, idx) => {
            if (idx === turnoIdx) box.classList.add('activo');
            else box.classList.remove('activo');
        });

        if (esMiTurno) {
            document.getElementById('btn-tirar').disabled = false;
            document.getElementById('anuncio').innerText = "¡Es tu turno! Tira los dados.";
        } else {
            document.getElementById('btn-tirar').disabled = true;
            document.getElementById('btn-plantar').disabled = true;
        }
    }

    function renderizarMarcador() {
        const grid = document.getElementById('grid-jugadores');
        grid.innerHTML = "";
        jugadores.forEach((j, i) => {
            grid.innerHTML += `
                <div class="jugador-box" id="j-box-${i}">
                    <div class="label-jugador">${j.nombre}</div>
                    <div class="pts-t">${j.puntos}</div>
                </div>`;
        });
    }

    function actualizarListaLobby(jugadores) {
        const lista = document.getElementById('lista-jugadores');
        lista.innerHTML = '';
        jugadores.forEach(j => {
            lista.innerHTML += `<li>👤 ${j.nombre}</li>`;
        });
    }

    // ================= VISUAL (Dados y Animaciones) =================
    function limpiarZonaActiva() {
        document.querySelectorAll('#zona-tiro .dado').forEach(d => d.remove());
    }
    function limpiarMesa() {
        limpiarZonaActiva();
        document.getElementById('reserva').innerHTML = "";
    }

    function animarDadosServidor(indices) {
        const zona = document.getElementById('zona-tiro');
        indices.forEach((idx, i) => {
            const d = document.createElement('div');
            d.className = 'dado';
            d.innerHTML = CARAS[idx].html;
            // Posición aleatoria simple
            const x = Math.random() * (zona.offsetWidth - 70) + 5;
            const y = Math.random() * (zona.offsetHeight - 70) + 5;
            d.style.left = x + "px";
            d.style.top = y + "px";
            zona.appendChild(d);
            setTimeout(() => { 
                d.classList.add('visible'); 
                d.style.transform = `rotate(${Math.random()*60-30}deg)`; 
                // Simular reserva visual
                setTimeout(() => {
                    d.classList.add('puntuando');
                    setTimeout(() => {
                        d.classList.replace('puntuando', 'reservado');
                        document.getElementById('reserva').appendChild(d);
                        d.style.position = 'static';
                    }, 500);
                }, 500);
            }, i*100);
        });
    }

    function mostrarGanador(nombre) {
        document.getElementById('nombre-ganador').innerText = nombre;
        document.getElementById('modal-ganador').style.display = 'flex';
    }
</script>
</body>
</html>
